<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Барои ту ❤️ букачам </title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 100%);
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            text-align: center;
        }

        /* ЭФФЕКТ НАЧАЛА: Появление карточки */
        .container {
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 40px rgba(216, 27, 96, 0.2);
            max-width: 95%;
            width: 400px;
            position: relative;
            z-index: 10;
            animation: slideIn 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-150px) scale(0.8); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        h1 {
            color: #d81b60;
            font-size: 24px;
            margin-bottom: 30px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gif-container img {
            width: 150px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            min-height: 100px;
            align-items: center;
        }

        button {
            padding: 12px 35px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        #yesBtn {
            background-color: #ff4081;
            color: white;
            box-shadow: 0 4px 15px rgba(255, 64, 129, 0.4);
            z-index: 10;
        }

        #noBtn {
            background-color: #9e9e9e;
            color: white;
            position: relative;
            z-index: 100;
        }

        /* ЭФФЕКТ ОКОНЧАНИЯ: Финальный экран */
        #successContent {
            display: none;
            animation: popUp 0.6s spring(1 0.8 10 0);
        }

        @keyframes popUp {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Сердечки для финала */
        .heart-particle {
            position: fixed;
            font-size: 25px;
            pointer-events: none;
            z-index: 99;
            animation: fall 3s linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container" id="mainCard">
        <div class="gif-container">
           
        </div>
        
        <h1 id="questionText">Мана нагз мебини ? ❤️</h1>

        <div class="btn-group">
            <button id="yesBtn">ҲА 🥰</button>
            <button id="noBtn">НЕ 😢</button>
        </div>
    </div>

    <div id="successContent" class="container">
        <h1 style="font-size: 35px;">Ураааааааааааа !😍</h1>
        <p style="font-size: 20px; color: #d81b60; font-weight: bold;"> Медонистам мана  Ганда медидагита 😅! 😘❤️</p>
    

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const mainCard = document.getElementById('mainCard');
        const successContent = document.getElementById('successContent');
        const questionText = document.getElementById('questionText');

        const phrasesNo = [
            "Натавонистӣ бука ! 😂", "Хато кардӣ! 😜", "иииии бо зер кард ! 🤔",
            "Ҳа-ҳа, наметони !", "харакат кун, чаён ! 💪",
            "Не гуфтан мумкин нест 😅! 🚫", "Тугма вайрон шуд! 🛠️",
            "Мана нагз намебиними ? 😢", "Биё, 'ҲА'-ро зер  кун! ✨",
            "Телефонат вайрон шуд? 📱", "Мана нагз мебиния ! 👻" , "уфф зер кун хая 😭" , "хая зер кун 🙏" ," Барои пишакат зер кун 😭" , "Ин тугма барои ту нест! 🚫", "Натавонистӣ! Холаҷон? 👵",  "Айб ия, 'Ҳа'-ро зер кун! 🙌"
        ];

        const yesSteps = [
            "Э, рост ми? 😂",
            "Агар рост бошад, ёгут гурон метия? 🎁",
            "Ваъда те ! ки нагз мебини  ✨",
            "Охирин бор мепурсам: Хами? 🥰", 
            "э неёе нагз мебиними вайй 😅" ,
            "Ха майли зер кун хая  " 
            
        ];

        let noIndex = 0;
        let yesStep = 0;

        function moveNo() {
            const maxX = window.innerWidth - noBtn.offsetWidth - 20;
            const maxY = window.innerHeight - noBtn.offsetHeight - 20;
            noBtn.style.position = 'fixed';
            noBtn.style.left = Math.max(10, Math.random() * maxX) + 'px';
            noBtn.style.top = Math.max(10, Math.random() * maxY) + 'px';
            noBtn.innerText = phrasesNo[noIndex % phrasesNo.length];
            noIndex++;
        }

        noBtn.addEventListener('mouseover', moveNo);
        noBtn.addEventListener('touchstart', (e) => { e.preventDefault(); moveNo(); });

        // ФУНКЦИЯ ДЛЯ ЭФФЕКТА СЕРДЕЧЕК (ОКОНЧАНИЕ)
        function createHearts() {
            for(let i=0; i<50; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.innerHTML = '❤️';
                    heart.className = 'heart-particle';
                    heart.style.left = Math.random() * 100 + 'vw';
                    heart.style.top = '-20px';
                    heart.style.transform = `scale(${Math.random() * 1.5})`;
                    document.body.appendChild(heart);
                    setTimeout(() => heart.remove(), 3000);
                }, i * 50);
            }
        }

        yesBtn.addEventListener('click', () => {
            if (yesStep < yesSteps.length) {
                questionText.innerText = yesSteps[yesStep];
                let currentFontSize = parseInt(window.getComputedStyle(yesBtn).fontSize);
                yesBtn.style.fontSize = (currentFontSize + 10) + 'px';
                yesStep++;
            } else {
                mainCard.style.display = 'none';
                successContent.style.display = 'block';
                document.body.style.background = '#fff9c4'; 
                createHearts(); // Запуск эффекта окончания
            }
        });
    </script>
</body>
</html>
